# ========================================
# DATABASE CONFIG — apna password daalo
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/aureum_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Nitin#2308

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8080

# App name
spring.application.name=aureum-backend

# CORS — React frontend ke liye (localhost:3000)
# ProductController mein already set hai, yeh just info ke liye

# ========================================
# JWT CONFIG
# ========================================
# Production mein ek strong random secret use karo (min 32 chars)
aureum.jwt.secret=aureum-luxury-jwt-secret-key-change-this-in-production-2024
aureum.jwt.expiration=86400000
# 86400000 ms = 24 hours

# ========================================
# SECURITY — Console login disable karo
# ========================================
spring.security.user.name=admin
spring.security.user.password=DISABLE
